<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CDO UNLP">
<meta name="theme-color" content="#f5f4f0">
<title>Plan de Estudio 2024 — CDO UNLP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0ddd4;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #a09d96;
    --green: #3b6d11;
    --green-bg: #eaf3de;
    --green-border: #97c459;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --amber-border: #ef9f27;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --red-border: #f09595;
    --accent: #185fa5;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: calc(var(--safe-top) + 1rem) 0 calc(var(--safe-bottom) + 5rem);
    overscroll-behavior: none;
  }

  .page { max-width: 680px; margin: 0 auto; padding: 0 1rem; }

  .install-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    padding: 10px 14px;
    font-size: 0.78rem;
    margin-bottom: 1rem;
    border-radius: 10px;
  }
  .install-banner.visible { display: flex; }
  .install-banner strong { font-weight: 400; flex: 1; line-height: 1.4; }
  .install-banner .close-btn { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 0 4px; opacity: 0.8; flex-shrink: 0; }

  header {
    padding: 1rem 0 1.2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.2rem;
  }

  .header-left h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p { font-size: 0.72rem; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 1rem; }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .donut-wrap { position: relative; flex-shrink: 0; }
  .donut-wrap svg { display: block; }
  .donut-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
  }
  .donut-pct { font-family: 'IBM Plex Mono', monospace; font-size: 1.2rem; font-weight: 500; color: var(--text); line-height: 1; }
  .donut-sub { font-size: 0.58rem; color: var(--text3); margin-top: 2px; }

  .stats { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .stat-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
  .stat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .stat-row span { color: var(--text2); flex: 1; }
  .stat-row strong { color: var(--text); font-weight: 500; font-family: 'IBM Plex Mono', monospace; }

  .hint { font-size: 0.67rem; color: var(--text3); font-family: 'IBM Plex Mono', monospace; text-align: center; padding: 8px 0 0; }

  .year-block { margin-bottom: 1.2rem; }
  .year-header {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 500;
    color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em;
    padding: 4px 0 8px; display: flex; align-items: center; gap: 10px;
  }
  .year-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .sem-label { font-size: 0.68rem; color: var(--text3); padding: 2px 0 4px 2px; font-family: 'IBM Plex Mono', monospace; }

  .materia-card {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
    min-height: 52px;
  }
  .materia-card:active { transform: scale(0.985); background: var(--surface2); }
  .materia-card.estado-0 { border-left: 3px solid var(--red-border); }
  .materia-card.estado-1 { border-left: 3px solid var(--amber-border); }
  .materia-card.estado-2 { border-left: 3px solid var(--green-border); }

  .status-circle {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; transition: all 0.2s;
  }
  .estado-0 .status-circle { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }
  .estado-1 .status-circle { border-color: var(--amber-border); background: var(--amber-bg); color: var(--amber); }
  .estado-2 .status-circle { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }

  .materia-code { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--text3); min-width: 34px; flex-shrink: 0; }
  .materia-name { font-size: 0.85rem; color: var(--text); flex: 1; line-height: 1.3; }

  .estado-pill {
    font-size: 0.6rem; border-radius: 20px; padding: 2px 7px;
    flex-shrink: 0; font-family: 'IBM Plex Mono', monospace; white-space: nowrap;
  }
  .pill-0 { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .pill-1 { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .pill-2 { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .opt-tag { font-size: 0.6rem; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 1px 5px; flex-shrink: 0; }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(245, 244, 240, 0.94);
    -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 calc(var(--safe-bottom) + 6px);
    z-index: 100;
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 0.62rem; color: var(--text3); background: none; border: none;
    cursor: pointer; padding: 4px 8px; font-family: 'IBM Plex Sans', sans-serif;
    transition: color 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-icon { font-size: 1.3rem; line-height: 1; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.2rem; }
  .res-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
  .res-card .res-n { font-family: 'IBM Plex Mono', monospace; font-size: 2rem; font-weight: 500; line-height: 1; }
  .res-card .res-l { font-size: 0.72rem; color: var(--text2); margin-top: 5px; }
  .n-green { color: var(--green); }
  .n-amber { color: var(--amber); }
  .n-red { color: var(--red); }
  .n-blue { color: var(--accent); }
  .res-card.full { grid-column: span 2; }

  .progress-bar-wrap { background: var(--surface2); border-radius: 20px; height: 8px; margin: 8px 0 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #97c459); border-radius: 20px; transition: width 0.5s ease; }

  .reset-btn {
    display: block; width: 100%; padding: 13px;
    background: none; border: 1px solid var(--border); border-radius: 10px;
    color: var(--red); font-size: 0.82rem; font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer; margin-top: 1rem; transition: background 0.15s;
  }
  .reset-btn:active { background: var(--red-bg); }
  .footer { font-size: 0.66rem; color: var(--text3); text-align: center; font-family: 'IBM Plex Mono', monospace; padding-top: 1rem; }
</style>
</head>
<body>
<div class="page">

  <div class="install-banner" id="install-banner">
    <strong>Para agregar a tu pantalla de inicio: abrí en Safari → tocá Compartir → "Añadir a pantalla de inicio"</strong>
    <button class="close-btn" onclick="dismissBanner()">×</button>
  </div>

  <header>
    <div class="header-left">
      <h1>Plan <span>2024</span></h1>
      <p>Ciencia de Datos en Organizaciones — UNLP</p>
    </div>
    <div class="progress-row">
      <div class="donut-wrap">
        <svg id="donut" width="90" height="90" viewBox="0 0 90 90"></svg>
        <div class="donut-center">
          <div class="donut-pct" id="pct">0%</div>
          <div class="donut-sub" id="pct-sub">0/29</div>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <p class="hint">tocá una materia para cambiar su estado</p>
  </header>

  <div class="tab-content active" id="tab-lista">
    <div id="lista"></div>
  </div>

  <div class="tab-content" id="tab-resumen">
    <div class="resumen-grid" id="resumen-grid"></div>
    <button class="reset-btn" onclick="resetAll()">Reiniciar todo el progreso</button>
    <p class="footer">Progreso guardado en este navegador · CDO UNLP 2024</p>
  </div>

</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tbtn-lista" onclick="switchTab('lista')">
    <span class="tab-icon">📋</span>Materias
  </button>
  <button class="tab-btn" id="tbtn-resumen" onclick="switchTab('resumen')">
    <span class="tab-icon">📊</span>Resumen
  </button>
</div>

<script>
const MATERIAS = [
  {year:1,sem:1,code:'I101',name:'Algoritmos y Programación I'},
  {year:1,sem:1,code:'X102',name:'Matemática A'},
  {year:1,sem:1,code:'E103',name:'Gestión de las Organizaciones'},
  {year:1,sem:2,code:'I104',name:'Algoritmos y Programación II'},
  {year:1,sem:2,code:'X105',name:'Matemática B'},
  {year:1,sem:2,code:'E106',name:'Economía y Medición Económica'},
  {year:2,sem:1,code:'I201',name:'Taller de Lenguajes'},
  {year:2,sem:1,code:'I202',name:'Introducción a Base de Datos'},
  {year:2,sem:1,code:'E203',name:'Contabilidad e interpretación de estados contables'},
  {year:2,sem:1,code:'X204',name:'Matemática C'},
  {year:2,sem:2,code:'I205',name:'Base de Datos'},
  {year:2,sem:2,code:'E206',name:'Procesos de Negocio'},
  {year:2,sem:2,code:'X207',name:'Matemática D'},
  {year:2,sem:2,code:'O208',name:'Inglés (Lectocomprensión y traducción)'},
  {year:3,sem:1,code:'I301',name:'Fundamentos de Arquitectura, SO y Redes'},
  {year:3,sem:1,code:'I302',name:'Ingeniería de Software'},
  {year:3,sem:1,code:'E303',name:'Costos e información para la gestión'},
  {year:3,sem:1,code:'E304',name:'Gestión de personas y equipos'},
  {year:3,sem:2,code:'I305',name:'Visualización de grandes volúmenes de datos'},
  {year:3,sem:2,code:'I306',name:'Minería de Datos y Aprendizaje Automático'},
  {year:3,sem:2,code:'E307',name:'Tecnologías para la Gestión'},
  {year:4,sem:1,code:'I401',name:'Conceptos y aplicaciones en Big Data'},
  {year:4,sem:1,code:'E402',name:'Finanzas de Empresas'},
  {year:4,sem:1,code:'E403',name:'Estrategia de tecnología y gestión de proyectos'},
  {year:4,sem:1,code:'E404',name:'Marketing estratégico y operativo'},
  {year:4,sem:2,code:'I405',name:'Aplicaciones de Inteligencia de Datos en organizaciones'},
  {year:4,sem:2,code:'E406',name:'Dirección General'},
  {year:4,sem:2,code:'O407',name:'Optativa',opt:true},
  {year:4,sem:2,code:'O408',name:'Práctica Profesional Supervisada (PPS)',opt:true},
];

const TOTAL=MATERIAS.length, LABELS=['pendiente','aprobada','promocionada'], ICONS=['✕','✓','★'];
const estados={};

function load(){
  try{ const r=localStorage.getItem('cdo_plan_2024'); if(r) Object.assign(estados,JSON.parse(r)); }catch(e){}
  MATERIAS.forEach(m=>{ if(estados[m.code]===undefined) estados[m.code]=0; });
}
function save(){ try{ localStorage.setItem('cdo_plan_2024',JSON.stringify(estados)); }catch(e){} }
function cycle(code){ estados[code]=(estados[code]+1)%3; save(); render(); }
function resetAll(){ if(!confirm('¿Reiniciar todo el progreso?')) return; MATERIAS.forEach(m=>estados[m.code]=0); save(); render(); }
function switchTab(n){ ['lista','resumen'].forEach(t=>{ document.getElementById('tab-'+t).classList.toggle('active',t===n); document.getElementById('tbtn-'+t).classList.toggle('active',t===n); }); }

function showInstallBanner(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  const dismissed=localStorage.getItem('cdo_banner_dismissed');
  if(isIOS&&!isStandalone&&!dismissed) document.getElementById('install-banner').classList.add('visible');
}
function dismissBanner(){ document.getElementById('install-banner').classList.remove('visible'); localStorage.setItem('cdo_banner_dismissed','1'); }

function drawDonut(g,y,r){
  const svg=document.getElementById('donut');
  const cx=45,cy=45,R=40,ri=28;
  const segs=[{v:g,c:'#639922'},{v:y,c:'#BA7517'},{v:r,c:'#E24B4A'}];
  let start=-Math.PI/2, paths='';
  if(g===0&&y===0){
    paths=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="#FCEBEB" stroke="#F09595" stroke-width="1.5"/>`;
  } else {
    segs.forEach(({v,c})=>{
      if(!v) return;
      const a=(v/TOTAL)*2*Math.PI, end=start+a;
      const x1o=cx+R*Math.cos(start),y1o=cy+R*Math.sin(start);
      const x2o=cx+R*Math.cos(end),y2o=cy+R*Math.sin(end);
      const x1i=cx+ri*Math.cos(end),y1i=cy+ri*Math.sin(end);
      const x2i=cx+ri*Math.cos(start),y2i=cy+ri*Math.sin(start);
      const lg=a>Math.PI?1:0;
      paths+=`<path d="M${x1o},${y1o} A${R},${R} 0 ${lg},1 ${x2o},${y2o} L${x1i},${y1i} A${ri},${ri} 0 ${lg},0 ${x2i},${y2i} Z" fill="${c}"/>`;
      start=end;
    });
  }
  paths+=`<circle cx="${cx}" cy="${cy}" r="${ri-1}" fill="#ffffff"/>`;
  svg.innerHTML=paths;
}

function render(){
  let g=0,y=0,r=0;
  MATERIAS.forEach(m=>{ const e=estados[m.code]; if(e===2)g++; else if(e===1)y++; else r++; });
  const aprobadas=g+y, pct=Math.round(aprobadas/TOTAL*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('pct-sub').textContent=`${aprobadas}/${TOTAL}`;
  drawDonut(g,y,r);
  document.getElementById('stats').innerHTML=`
    <div class="stat-row"><div class="stat-dot" style="background:#639922"></div><span>Promocionadas</span><strong>${g}</strong></div>
    <div class="stat-row"><div class="stat-dot" style="background:#BA7517"></div><span>Aprobadas</span><strong>${y}</strong></div>
    <div class="stat-row"><div class="stat-dot" style="background:#E24B4A"></div><span>Pendientes</span><strong>${r}</strong></div>
  `;

  let html='';
  [1,2,3,4].forEach(yr=>{
    html+=`<div class="year-block"><div class="year-header">${yr}° Año</div>`;
    [1,2].forEach(sem=>{
      const mats=MATERIAS.filter(m=>m.year===yr&&m.sem===sem);
      if(!mats.length) return;
      html+=`<div class="sem-label">${sem===1?'Primer semestre':'Segundo semestre'}</div>`;
      mats.forEach(m=>{
        const e=estados[m.code];
        html+=`<div class="materia-card estado-${e}" onclick="cycle('${m.code}')">
          <div class="status-circle">${ICONS[e]}</div>
          <span class="materia-code">${m.code}</span>
          <span class="materia-name">${m.name}</span>
          ${m.opt?'<span class="opt-tag">opt.</span>':''}
          <span class="estado-pill pill-${e}">${LABELS[e]}</span>
        </div>`;
      });
    });
    html+='</div>';
  });
  document.getElementById('lista').innerHTML=html;

  const byYear=[1,2,3,4].map(yr=>{ const mats=MATERIAS.filter(m=>m.year===yr); const ap=mats.filter(m=>estados[m.code]>0).length; return{yr,total:mats.length,ap}; });
  let rg=`
    <div class="res-card"><div class="res-n n-green">${g}</div><div class="res-l">Promocionadas</div></div>
    <div class="res-card"><div class="res-n n-amber">${y}</div><div class="res-l">Aprobadas</div></div>
    <div class="res-card"><div class="res-n n-red">${r}</div><div class="res-l">Pendientes</div></div>
    <div class="res-card"><div class="res-n n-blue">${pct}%</div><div class="res-l">Completado</div></div>
  `;
  byYear.forEach(({yr,total,ap})=>{
    const p=Math.round(ap/total*100);
    rg+=`<div class="res-card full">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:0.8rem;color:var(--text2)">${yr}° Año</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--text2)">${ap}/${total}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${p}%"></div></div>
      <div style="font-size:0.66rem;color:var(--text3);text-align:right">${p}%</div>
    </div>`;
  });
  document.getElementById('resumen-grid').innerHTML=rg;
}

load(); render(); showInstallBanner();
</script>
</body>
</html>
